<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AM Muse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'milk': '#FAF5EC',
              'peach': '#FAD2B8',
              'icy-blue': '#D5E0EC',
              'slate-blue': '#A0B2C7',
              'dark-navy': '#2F3E5D',
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-milk">
    <header class="container mx-auto py-8 text-center">
        <img src="assets/logo.jpeg" alt="AM Muse Logo" class="mx-auto h-32">
    </header>
    <main class="container mx-auto">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Product cards will be injected here by JavaScript -->
        </div>
    </main>
    <footer class="text-center py-4 mt-8">
        <p class="text-slate-blue">&copy; 2026 AM Muse. Все права защищены.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
